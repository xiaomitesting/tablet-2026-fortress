<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi 平板智能選購平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo" onclick="App.switchTab('quiz');return false;">
                <div class="logo-icon">M</div>
                <div class="logo-text">Xiaomi <span>平板選購助手</span></div>
            </a>
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="quiz" onclick="App.switchTab('quiz')">🎯 智能推薦</button>
                <button class="nav-tab" data-tab="catalog" onclick="App.switchTab('catalog')">📱 全部機型</button>
                <button class="nav-tab" data-tab="competitor" onclick="App.switchTab('competitor')">⚔️ 競品對比</button>
                <button class="nav-tab" data-tab="guide" onclick="App.switchTab('guide')">📖 選購指南</button>
                <button class="nav-tab" data-tab="calculator" onclick="App.switchTab('calculator')">🧮 預算計算</button>
                <button class="nav-tab" data-tab="favorites" onclick="App.switchTab('favorites')" style="position:relative;">
                    ❤️ 收藏
                    <span id="fav-count" class="fav-count" style="display:none;">0</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <div class="hero">
        <h1>尋找最適合您的小米平板</h1>
        <p>回答 5 個簡單問題，AI 為您推薦最佳機型。或直接瀏覽產品目錄、競品對比、預算計算，一站式搞定。</p>
    </div>

    <!-- Tab 1: 智能推薦 -->
    <section id="section-quiz" class="section tab-section">
        <div id="quiz-card" class="quiz-card"></div>
    </section>

    <!-- Tab 2: 產品目錄 -->
    <section id="section-catalog" class="section tab-section hidden">
        <div class="section-title">📱 全部機型</div>
        <div id="catalog-grid"></div>
    </section>

    <!-- Tab 3: 競品對比 -->
    <section id="section-competitor" class="section tab-section hidden">
        <div class="section-title">⚔️ 競品對比</div>
        <div id="competitor-section"></div>
    </section>

    <!-- Tab 4: 選購指南 -->
    <section id="section-guide" class="section tab-section hidden">
        <div class="section-title">📖 選購指南</div>
        <div id="guide-section"></div>
    </section>

    <!-- Tab 5: 預算計算器 -->
    <section id="section-calculator" class="section tab-section hidden">
        <div class="section-title">🧮 預算計算器</div>
        <div id="calculator-section"></div>
    </section>

    <!-- Tab 6: 收藏 -->
    <section id="section-favorites" class="section tab-section hidden">
        <div class="section-title">❤️ 我的收藏</div>
        <div id="favorites-section"></div>
    </section>

    <!-- Compare Drawer -->
    <div id="compare-drawer" class="compare-drawer">
        <div style="max-width:1200px;margin:0 auto;">
            <div class="flex justify-between items-center">
                <h3 style="font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;">
                    ⚖️ 產品對比 <span id="compare-count" style="background:var(--mi-orange);color:white;font-size:12px;padding:2px 8px;border-radius:12px;">0</span>
                </h3>
                <div class="flex gap-3">
                    <button class="btn-primary" onclick="Compare.openModal()" style="font-size:13px;padding:8px 16px;">
                        立即對比
                    </button>
                    <button class="btn-outline" onclick="Compare.clear()" style="font-size:13px;padding:8px 16px;">
                        清空
                    </button>
                </div>
            </div>
            <div id="compare-chips" class="compare-chips"></div>
        </div>
    </div>

    <!-- Compare Modal -->
    <div id="compare-modal" class="modal-overlay" onclick="if(event.target===this)Compare.closeModal();">
        <div class="modal">
            <div class="modal-header">
                <h3>⚖️ 詳細規格對比</h3>
                <button class="modal-close" onclick="Compare.closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <table class="compare-table">
                    <thead>
                        <tr id="compare-table-headers"></tr>
                    </thead>
                    <tbody id="compare-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Xiaomi 平板智能選購平台 · 數據僅供參考，以官網為準 · Made with 🦞</p>
    </footer>

    <!-- Scripts -->
    <script src="js/data/products.js"></script>
    <script src="js/modules/quiz.js"></script>
    <script src="js/modules/catalog.js"></script>
    <script src="js/modules/compare.js"></script>
    <script src="js/modules/competitors.js"></script>
    <script src="js/modules/favorites.js"></script>
    <script src="js/modules/calculator.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
